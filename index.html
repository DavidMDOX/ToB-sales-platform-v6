<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Harbor Supply</title>
  <style>
    :root{
      --bg:#f4f6f8;
      --panel:#ffffff;
      --panel-2:#f7f8fa;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --green:#1f7a4f;
      --green-2:#2d9a65;
      --green-soft:#e9f7ef;
      --gold:#ffb648;
      --gold-soft:#fff3dd;
      --red:#d75b4b;
      --shadow:0 12px 32px rgba(17,24,39,.08);
      --radius:24px;
      --radius-sm:16px;
      --phone-w:400px;
      --nav-h:84px;
      --top-safe:12px;
      --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:radial-gradient(circle at top left,#f6efe0 0,#eef2f6 38%,#e7ecf2 100%);font-family:var(--font);color:var(--text)}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .desktop-shell{display:flex;gap:28px;align-items:center;justify-content:center;width:100%}
    .phone{
      width:min(var(--phone-w),100vw);
      height:min(860px,calc(100vh - 24px));
      background:linear-gradient(180deg,#fcfcfd 0%,#f4f6f8 100%);
      border-radius:36px;
      box-shadow:0 28px 80px rgba(15,23,42,.18);
      border:1px solid rgba(255,255,255,.8);
      overflow:hidden;
      position:relative;
    }
    .phone::before{content:"";position:absolute;top:12px;left:50%;transform:translateX(-50%);width:116px;height:8px;border-radius:999px;background:#d9dde4;z-index:30}
    .screen-stack{position:absolute;inset:0;padding-top:calc(var(--top-safe) + 16px);padding-bottom:var(--nav-h);overflow:hidden}
    .screen{position:absolute;inset:0;overflow:auto;padding:24px 20px 110px;display:none;scroll-behavior:smooth}
    .screen.active{display:block}
    .screen::-webkit-scrollbar{display:none}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:12px;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:12px}
    .brand-mark{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#1f7a4f,#36b073);display:grid;place-items:center;color:#fff;font-weight:800;box-shadow:0 12px 24px rgba(31,122,79,.24)}
    .brand-title{font-size:20px;font-weight:800;letter-spacing:.2px}
    .brand-sub{font-size:12px;color:var(--muted);margin-top:2px}
    .icon-btn,.ghost-btn{border:none;background:var(--panel);border-radius:14px;height:42px;min-width:42px;padding:0 14px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow);color:var(--text);cursor:pointer}
    .ghost-btn{background:#ffffffd9;border:1px solid var(--line)}
    .lang-switch{display:flex;background:#ffffffcc;border:1px solid var(--line);padding:4px;border-radius:14px;gap:4px;box-shadow:var(--shadow)}
    .lang-switch button{border:none;background:transparent;padding:8px 10px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;color:var(--muted)}
    .lang-switch button.active{background:#111827;color:#fff}
    .panel{background:var(--panel);border:1px solid rgba(229,231,235,.7);border-radius:var(--radius);box-shadow:var(--shadow)}
    .hero{padding:18px;background:linear-gradient(135deg,#113a28 0%,#1f7a4f 45%,#37ab74 100%);color:#fff;position:relative;overflow:hidden}
    .hero::after{content:"";position:absolute;right:-34px;bottom:-44px;width:168px;height:168px;background:rgba(255,255,255,.14);border-radius:50%}
    .hero::before{content:"";position:absolute;right:54px;top:-18px;width:74px;height:74px;background:rgba(255,255,255,.10);border-radius:50%}
    .hero-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:relative;z-index:1}
    .eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.14);backdrop-filter:blur(6px)}
    .hero h1{margin:12px 0 6px;font-size:28px;line-height:1.08;letter-spacing:-.03em}
    .hero p{margin:0;color:rgba(255,255,255,.86);font-size:13px;line-height:1.5;max-width:75%}
    .hero-cta{display:flex;gap:10px;margin-top:18px;position:relative;z-index:1}
    .btn-primary,.btn-secondary,.btn-tertiary{border:none;border-radius:16px;padding:12px 16px;font-weight:800;font-size:13px;cursor:pointer}
    .btn-primary{background:#fff;color:#12412c}
    .btn-secondary{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.2)}
    .btn-tertiary{background:var(--green-soft);color:var(--green);padding:10px 14px;border-radius:14px}
    .section{margin-top:18px}
    .section-head{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;margin-bottom:12px}
    .section-title{font-size:18px;font-weight:800;letter-spacing:-.02em}
    .section-sub{font-size:12px;color:var(--muted);margin-top:3px}
    .delivery-row,.search-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:12px 14px;box-shadow:var(--shadow)}
    .field label{display:block;font-size:11px;color:var(--muted);font-weight:700;margin-bottom:6px}
    .field select,.field input,.field textarea{width:100%;border:none;outline:none;background:transparent;font-size:15px;color:var(--text);font-family:var(--font)}
    .field textarea{resize:none;min-height:84px;line-height:1.45}
    .search-row{grid-template-columns:1fr auto;margin-top:12px}
    .search-field{display:flex;align-items:center;gap:10px}
    .search-field input{font-size:14px}
    .chip-row{display:flex;gap:10px;overflow:auto;padding-bottom:4px}
    .chip-row::-webkit-scrollbar{display:none}
    .chip{flex:0 0 auto;border:none;background:var(--panel);border:1px solid var(--line);padding:10px 14px;border-radius:999px;font-size:13px;font-weight:700;color:#374151;display:flex;align-items:center;gap:8px;cursor:pointer;box-shadow:var(--shadow)}
    .chip.active{background:#111827;color:#fff;border-color:#111827}
    .mini-promo{display:grid;grid-template-columns:1.25fr .95fr;gap:12px}
    .promo-card{padding:16px;border-radius:24px;background:linear-gradient(135deg,#fff8eb,#fff);border:1px solid #f3e1b8;box-shadow:var(--shadow)}
    .promo-card.dark{background:linear-gradient(135deg,#121826,#22324f);border-color:transparent;color:#fff}
    .promo-tag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;padding:7px 10px;border-radius:999px;background:#fff2cf;color:#7a5400}
    .promo-card.dark .promo-tag{background:rgba(255,255,255,.14);color:#fff}
    .promo-card h3{margin:10px 0 6px;font-size:20px;line-height:1.1}
    .promo-card p{margin:0 0 14px;font-size:12px;line-height:1.5;color:inherit;opacity:.82}
    .product-list{display:flex;flex-direction:column;gap:12px}
    .product-card{display:grid;grid-template-columns:88px 1fr;gap:12px;padding:12px;border-radius:24px;background:var(--panel);border:1px solid rgba(229,231,235,.85);box-shadow:var(--shadow);cursor:pointer}
    .product-visual{width:88px;height:88px;border-radius:22px;background:linear-gradient(135deg,#f7fafc,#eff4f7);display:grid;place-items:center;overflow:hidden;border:1px solid #edf1f4}
    .product-visual img{width:100%;height:100%;object-fit:cover}
    .p-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .p-name{font-size:15px;font-weight:800;line-height:1.25;margin-bottom:4px}
    .p-desc{font-size:12px;line-height:1.45;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;max-width:97%}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:10px;font-weight:800;white-space:nowrap}
    .badge.own{background:#ecf8f0;color:#186744}
    .badge.normal{background:#f2f4f7;color:#4b5563}
    .price-row{display:flex;align-items:flex-end;gap:10px;margin-top:10px;flex-wrap:wrap}
    .price-main{font-size:22px;font-weight:900;letter-spacing:-.03em}
    .price-unit{font-size:12px;color:var(--muted);margin-left:4px;font-weight:600}
    .compare{font-size:12px;color:var(--muted)}
    .compare strong{color:#111827}
    .strike{color:#9ca3af;text-decoration:line-through}
    .mode-row,.action-row{display:flex;align-items:center;gap:8px;justify-content:space-between;margin-top:10px;flex-wrap:wrap}
    .mode-toggle{display:flex;gap:6px;background:var(--panel-2);padding:4px;border-radius:14px;border:1px solid var(--line)}
    .mode-toggle button{border:none;background:transparent;padding:8px 10px;border-radius:10px;font-size:12px;font-weight:800;color:var(--muted);cursor:pointer}
    .mode-toggle button.active{background:#111827;color:#fff}
    .action-left{display:flex;gap:8px;flex-wrap:wrap}
    .mini-btn{border:none;background:var(--panel-2);padding:10px 12px;border-radius:14px;font-size:12px;font-weight:800;color:#374151;cursor:pointer}
    .mini-btn.green{background:var(--green-soft);color:var(--green)}
    .stepper{display:flex;align-items:center;background:#111827;border-radius:16px;color:#fff;padding:4px;gap:6px;min-width:108px;justify-content:space-between}
    .stepper button{width:32px;height:32px;border:none;border-radius:12px;background:#fff;color:#111827;font-size:20px;line-height:1;cursor:pointer}
    .stepper .qty{font-size:14px;font-weight:900;min-width:22px;text-align:center}
    .bottom-nav{position:absolute;left:14px;right:14px;bottom:12px;height:72px;padding:10px 12px;background:rgba(255,255,255,.9);backdrop-filter:blur(14px);border:1px solid rgba(229,231,235,.9);box-shadow:0 18px 40px rgba(17,24,39,.12);border-radius:28px;display:grid;grid-template-columns:1fr 1fr 1.15fr 1fr 1fr;align-items:center;z-index:25}
    .nav-btn{border:none;background:transparent;color:#687280;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-size:11px;font-weight:700;cursor:pointer;position:relative}
    .nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2}
    .nav-btn.active{color:#111827}
    .nav-btn.center{height:52px;background:linear-gradient(135deg,#1f7a4f,#36b073);border-radius:18px;color:#fff;box-shadow:0 18px 28px rgba(31,122,79,.34)}
    .nav-badge{position:absolute;top:-2px;right:18px;min-width:18px;height:18px;padding:0 6px;border-radius:999px;background:#ff6d4a;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:800}
    .detail-hero{padding:18px;border-radius:28px;background:linear-gradient(180deg,#f6faf7,#fff);border:1px solid var(--line);box-shadow:var(--shadow)}
    .back-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .back-link{border:none;background:transparent;padding:0;font-size:14px;font-weight:800;color:#111827;display:flex;gap:8px;align-items:center;cursor:pointer}
    .detail-image{height:220px;border-radius:26px;background:linear-gradient(135deg,#f2f7f4,#edf2f6);display:grid;place-items:center;border:1px solid #edf1f4;overflow:hidden}
    .detail-image img{width:100%;height:100%;object-fit:cover}
    .detail-name{font-size:28px;font-weight:900;letter-spacing:-.04em;line-height:1.05;margin:16px 0 8px}
    .detail-sub{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:14px}
    .metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .metric{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:12px 10px;text-align:center}
    .metric .num{font-size:17px;font-weight:900}
    .metric .label{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.35}
    .detail-block{margin-top:16px;padding:16px;border-radius:22px;background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow)}
    .detail-block h3{margin:0 0 10px;font-size:16px;font-weight:900}
    .info-list{display:flex;flex-direction:column;gap:10px}
    .info-item{display:flex;justify-content:space-between;gap:16px;font-size:13px}
    .info-item span:first-child{color:var(--muted)}
    .chart-box{margin-top:10px;height:160px;background:linear-gradient(180deg,#fafafa,#fff);border:1px solid var(--line);border-radius:18px;padding:10px}
    .chart-box svg{width:100%;height:100%}
    .neg-card{padding:18px;border-radius:26px;background:linear-gradient(180deg,#fff,#fbfcfd);border:1px solid var(--line);box-shadow:var(--shadow)}
    .credit-banner{margin-top:12px;padding:12px 14px;border-radius:16px;background:#fff3de;color:#805100;font-size:12px;line-height:1.55;border:1px solid #f4d18b}
    .upload-box{border:1.5px dashed #d1d5db;border-radius:18px;padding:16px;text-align:center;background:#fafafa}
    .upload-box input{display:none}
    .upload-label{display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:13px}
    .file-note{font-size:12px;color:var(--green);font-weight:700;margin-top:8px}
    .summary-card{padding:18px;border-radius:26px;background:linear-gradient(135deg,#101827,#1f2b40);color:#fff;box-shadow:var(--shadow)}
    .summary-row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px}
    .summary-metric{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px}
    .summary-metric .big{font-size:28px;font-weight:900;letter-spacing:-.04em}
    .summary-metric .small{font-size:12px;color:rgba(255,255,255,.76);margin-top:4px;line-height:1.45}
    .order-card{padding:16px;border-radius:22px;background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow);display:flex;gap:12px;align-items:center}
    .order-card + .order-card{margin-top:10px}
    .order-thumb{width:64px;height:64px;border-radius:18px;overflow:hidden;background:#f4f7f9;border:1px solid #edf1f4;display:grid;place-items:center}
    .order-thumb img{width:100%;height:100%;object-fit:cover}
    .order-meta{flex:1;min-width:0}
    .order-name{font-size:14px;font-weight:900;margin-bottom:4px}
    .order-sub{font-size:12px;color:var(--muted);line-height:1.45}
    .order-price{font-size:15px;font-weight:900}
    .order-status{font-size:11px;font-weight:800;color:var(--green);background:var(--green-soft);padding:6px 10px;border-radius:999px;display:inline-flex;margin-top:8px}
    .checkout-bar{position:sticky;bottom:0;margin-top:16px;padding:16px;border-radius:24px;background:rgba(255,255,255,.94);backdrop-filter:blur(10px);border:1px solid var(--line);box-shadow:var(--shadow)}
    .checkout-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .checkout-total{font-size:28px;font-weight:900;letter-spacing:-.04em}
    .checkout-note{font-size:12px;color:var(--muted)}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .stats-card{padding:18px;border-radius:26px;background:var(--panel);border:1px solid var(--line);box-shadow:var(--shadow)}
    .stats-title{font-size:12px;color:var(--muted);font-weight:800;margin-bottom:6px}
    .stats-big{font-size:30px;font-weight:900;letter-spacing:-.04em}
    .stats-trend{font-size:12px;color:var(--green);font-weight:800;margin-top:8px}
    .bars{display:flex;align-items:flex-end;gap:10px;height:140px;padding:8px 0 4px}
    .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:8px;height:100%}
    .bar{width:100%;max-width:34px;border-radius:12px 12px 6px 6px;background:linear-gradient(180deg,#37ab74,#1f7a4f)}
    .bar-col span{font-size:10px;color:var(--muted);font-weight:700}
    .ai-card{padding:16px;border-radius:22px;background:linear-gradient(135deg,#f4f8ff,#fff);border:1px solid #dbe7ff;box-shadow:var(--shadow)}
    .ai-card h3{margin:0 0 8px;font-size:16px;font-weight:900}
    .ai-card p{margin:0;font-size:13px;color:#475569;line-height:1.55}
    .list-lite{display:flex;flex-direction:column;gap:10px;margin-top:12px}
    .list-lite .row{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#f8fafc;border:1px solid #e8edf2;padding:12px 14px;border-radius:16px}
    .muted{color:var(--muted)}
    .empty{padding:28px 18px;text-align:center;background:var(--panel);border:1px dashed var(--line);border-radius:22px;color:var(--muted)}
    .right-actions{display:flex;gap:10px;align-items:center}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:9px 12px;border-radius:999px;background:#f3f4f6;font-size:12px;font-weight:800;color:#374151}
    .pill.green{background:var(--green-soft);color:var(--green)}
    .tiny{font-size:11px;color:var(--muted)}
    @media (max-width: 768px){
      body{padding:0;background:#fff;display:block}
      .desktop-shell{display:block}
      .phone{width:100vw;height:100vh;border-radius:0;box-shadow:none;border:none}
      .phone::before{top:8px}
    }
  </style>
</head>
<body>
<div class="desktop-shell">
  <div class="phone">
    <div class="screen-stack">
      <section class="screen active" id="screen-home"></section>
      <section class="screen" id="screen-catalog"></section>
      <section class="screen" id="screen-offers"></section>
      <section class="screen" id="screen-orders"></section>
      <section class="screen" id="screen-profile"></section>
      <section class="screen" id="screen-detail"></section>
      <section class="screen" id="screen-negotiate"></section>
      <section class="screen" id="screen-order-detail"></section>
    </div>
    <nav class="bottom-nav">
      <button class="nav-btn active" data-nav="home"></button>
      <button class="nav-btn" data-nav="catalog"></button>
      <button class="nav-btn center" data-nav="orders"></button>
      <button class="nav-btn" data-nav="offers"></button>
      <button class="nav-btn" data-nav="profile"></button>
    </nav>
  </div>
</div>
<script>
const appState = {
  lang: 'zh',
  region: 'birmingham',
  slot: 'standard',
  nav: 'home',
  selectedCategory: 'all',
  search: '',
  detailId: null,
  negotiateId: null,
  orderDetailId: 'o-1009',
  fileAttached: false,
  cart: {},
  mode: {},
};

const regions = [

const categories = [
  { id:'all', en:'All', zh:'全部', emoji:'✨' },
  { id:'rice', en:'Rice', zh:'米类', emoji:'🍚' },
  { id:'flour', en:'Flour', zh:'面粉', emoji:'🌾' },
  { id:'oil', en:'Oil', zh:'油类', emoji:'🫒' },
  { id:'sauce', en:'Sauce', zh:'酱料', emoji:'🥣' },
  { id:'seasoning', en:'Seasoning', zh:'调料', emoji:'🧂' },
  { id:'beverage', en:'Beverage', zh:'饮品', emoji:'🥤' },
  { id:'snack', en:'Snack', zh:'零食', emoji:'🥨' },
  { id:'packaging', en:'Packaging', zh:'包装', emoji:'📦' },

const competitorOptions = [
  {en:'Wing Yip', zh:'荣业行 Wing Yip'},
  {en:'Longdan', zh:'龙凤行 Longdan'},
  {en:'SeeWoo', zh:'泗和行 SeeWoo'},
  {en:'JJ Foodservice', zh:'JJ Foodservice'},
  {en:'Local wholesaler', zh:'本地批发商'},
];

const metrics = {
  saved: { zh:'本月已省', en:'Saved this month', value:'£1,286' },
  rebate: { zh:'自营返利', en:'Own-brand rebate', value:'£318' },
  credits: { zh:'可用积分', en:'Credits ready', value:'2,480' },
  repeat: { zh:'30天复购', en:'30-day repeat', value:'74%' },
};

function svgData(kind, a, b, label) {
  const map = {

function makeLineChart(values) {
  const w = 320, h = 130, pad = 14;
  const min = Math.min(...values), max = Math.max(...values), range = max-min || 1;
  const pts = values.map((v,i)=>{
    const x = pad + (i * (w - pad*2) / (values.length-1));
    const y = h - pad - ((v-min) / range) * (h - pad*2);
    return [x,y];
  });
  const d = pts.map((p,i)=>`${i===0?'M':'L'} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs><linearGradient id="area" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#36b073" stop-opacity="0.25"/><stop offset="100%" stop-color="#36b073" stop-opacity="0.02"/></linearGradient></defs>
    ${[0,1,2,3].map(i=>`<line x1="${pad}" x2="${w-pad}" y1="${pad + i*(h-pad*2)/3}" y2="${pad + i*(h-pad*2)/3}" stroke="#e5e7eb" stroke-width="1"/>`).join('')}
    <path d="${d} L ${pts[pts.length-1][0]} ${h-pad} L ${pts[0][0]} ${h-pad} Z" fill="url(#area)"/>
    <path d="${d}" fill="none" stroke="#1f7a4f" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="${i===pts.length-1?5:3.6}" fill="${i===pts.length-1?'#ffb648':'#ffffff'}" stroke="#1f7a4f" stroke-width="2"/>`).join('')}
  </svg>`;
}

      <div class="section" style="margin-top:12px"><div class="field"><label>${t('note','noteEn')}</label><textarea placeholder="${appState.lang==='zh'?'可填写对方价格、起订量、配送条件等':'Add competitor price, MOQ or delivery terms'}"></textarea></div></div>
      <div class="section" style="margin-top:12px">
        <div class="upload-box">
          <label class="upload-label">
            <input type="file" id="proof-upload" accept="image/*" />
            <strong>${t('upload','uploadEn')}</strong>
            <span>${appState.lang==='zh'?'支持报价单截图、货架照片或聊天记录截图':'Quote screenshots, shelf photos or chat screenshots are accepted'}</span>
          </label>
          ${appState.fileAttached ? `<div class="file-note">${appState.lang==='zh'?'已选择图片，预计返还积分':'Image attached, credits expected'}</div>`:''}
        </div>
        <div class="credit-banner">${t('uploadTip','uploadTipEn')} ${appState.lang==='zh'?'当前商品可返':'This item can return'} +${p.credit} ${appState.lang==='zh'?'积分。':'credits.'}</div>
      </div>
      <div class="section" style="margin-top:14px"><button class="btn-primary" style="width:100%;background:linear-gradient(135deg,#1f7a4f,#36b073);color:#fff">${t('sendReq','sendReqEn')}</button></div>
    </div>
  `;
}

function renderOrderDetail() {
  const order = ordersHistory.find(o=>o.id===appState.orderDetailId) || ordersHistory[0];
  const breakdown = {};
  order.items.forEach(([pid,mode,qty])=>{
    const p = products.find(x=>x.id===pid);
    const cat = p.category;
    breakdown[cat] = (breakdown[cat] || 0) + currentPrice(p, mode)*qty;
  });
  document.getElementById('screen-order-detail').innerHTML = `
    <div class="back-row" style="margin-top:12px"><button class="back-link" data-back="orders">${icon('back')}${appState.lang==='zh'?'返回订单':'Back to orders'}</button><div class="lang-switch"><button class="${appState.lang==='zh'?'active':''}" data-lang="zh">中</button><button class="${appState.lang==='en'?'active':''}" data-lang="en">EN</button></div></div>
    <div class="summary-card"><div class="eyebrow">${t('orderDetail','orderDetailEn')}</div><h3 style="margin:12px 0 0;font-size:24px">${order.code}</h3><div class="summary-row"><div class="summary-metric"><div class="big">${fmt(order.total)}</div><div class="small">${appState.lang==='zh'?'订单金额':'Order total'}</div></div><div class="summary-metric"><div class="big">${appState.lang==='zh'?order.status.zh:order.status.en}</div><div class="small">${appState.lang==='zh'?order.eta.zh:order.eta.en}</div></div></div></div>
    <div class="detail-block"><h3>${t('reportTitle','reportTitleEn')}</h3><div class="chart-box">${makeLineChart([102,100,98,95,96,92,90,88,84,79])}</div><div class="tiny" style="margin-top:8px">${appState.lang==='zh'?'示意：本单核心商品的近期开奖价走势':'Illustrative trend for key items in this order'}</div></div>
    <div class="detail-block"><h3>${appState.lang==='zh'?'品类结构':'Category breakdown'}</h3><div class="list-lite">${Object.entries(breakdown).map(([cat,val])=>`<div class="row"><span>${appState.lang==='zh'?categories.find(c=>c.id===cat).zh:categories.find(c=>c.id===cat).en}</span><strong>${fmt(val)}</strong></div>`).join('')}</div></div>
    <div class="ai-card section"><h3>${t('aiTitle','aiTitleEn')}</h3><p>${appState.lang==='zh'?'如果继续保持当前采购结构，建议下次优先锁定米、油和包装，以获得更稳的综合成本。':'If you keep a similar purchasing structure, lock rice, oil and packaging earlier next time for steadier total landed cost.'}</p></div>
  `;
}

function openScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const target = document.getElementById(`screen-${id}`);
  if (target) target.classList.add('active');
}

function render() {
  renderNav();
  renderHome();
  renderCatalog();
  renderOffers();
  renderOrders();
  renderProfile();
  if (appState.detailId) renderDetail();
  if (appState.negotiateId) renderNegotiate();
  renderOrderDetail();
  const mainScreens = ['home','catalog','orders','offers','profile'];
  if (mainScreens.includes(appState.nav)) openScreen(appState.nav);
}

function goNav(id) {
  appState.nav = id;
  render();
}

function openDetail(id) {
  appState.detailId = id;
  renderDetail();
  openScreen('detail');
}

function openNegotiate(id) {
  appState.negotiateId = id;
  renderNegotiate();
  openScreen('negotiate');
}

function openOrderDetail(id) {
  appState.orderDetailId = id;
  renderOrderDetail();
  openScreen('order-detail');
}

function updateQty(id, mode, delta) {
  const next = Math.max(0, (appState.cart[id][mode] || 0) + delta);
  appState.cart[id][mode] = next;
  render();
  if (appState.detailId === id) { renderDetail(); }
  if (appState.negotiateId === id) { renderNegotiate(); }
}

function bindEvents() {
  document.body.addEventListener('click', e => {
    const nav = e.target.closest('[data-nav]');
    if (nav) return goNav(nav.dataset.nav);
    const jump = e.target.closest('[data-nav-jump]');
    if (jump) return goNav(jump.dataset.navJump);
    const lang = e.target.closest('[data-lang]');
    if (lang) { appState.lang = lang.dataset.lang; return render(); }
    const cat = e.target.closest('[data-cat]');
    if (cat) { appState.selectedCategory = cat.dataset.cat; appState.nav = appState.nav === 'home' ? 'home' : 'catalog'; return render(); }
    const open = e.target.closest('[data-open]');
    if (open) {
      if (open.dataset.open === 'detail') return openDetail(open.dataset.id);
      if (open.dataset.open === 'negotiate') return openNegotiate(open.dataset.id);
    }
    const step = e.target.closest('[data-act]');
    if (step) return updateQty(step.dataset.id, step.dataset.mode, step.dataset.act === 'plus' ? 1 : -1);
    const modeBtn = e.target.closest('[data-mode][data-pid]');
    if (modeBtn) { appState.mode[modeBtn.dataset.pid] = modeBtn.dataset.mode; return render(); }
    const back = e.target.closest('[data-back]');
    if (back) {
      if (back.dataset.back === 'detail') return openDetail(appState.negotiateId || appState.detailId || products[0].id);
      openScreen(back.dataset.back);
      if (['home','catalog','orders','offers','profile'].includes(back.dataset.back)) appState.nav = back.dataset.back;
      return renderNav();
    }
    const order = e.target.closest('[data-open-order]');
    if (order) return openOrderDetail(order.dataset.openOrder);
    const own = e.target.closest('[data-home-own]');
    if (own) { appState.selectedCategory = 'all'; appState.search = 'Harbor'; appState.nav = 'catalog'; return render(); }
  });

  document.body.addEventListener('change', e => {
    if (e.target.id === 'region-select') { appState.region = e.target.value; return render(); }
    if (e.target.id === 'slot-select') { appState.slot = e.target.value; return render(); }
    if (e.target.id === 'proof-upload') { appState.fileAttached = e.target.files && e.target.files.length > 0; return renderNegotiate(); }
  });

  document.body.addEventListener('input', e => {
    if (e.target.id === 'search-input' || e.target.id === 'catalog-search') { appState.search = e.target.value; return render(); }
  });
}

bindEvents();
render();
</script>
</body>
</html>
