<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Asterra Supply</title>
<meta name="theme-color" content="#0f172a" />
<style>
:root{
  --bg:#f4f7fb;
  --surface:#ffffff;
  --surface-2:#f8fafc;
  --line:#e5ebf2;
  --text:#0f172a;
  --muted:#64748b;
  --green:#1f8a57;
  --green-2:#dff6ea;
  --green-3:#0f6d45;
  --gold:#d9a441;
  --accent:#eff6ff;
  --shadow:0 18px 44px rgba(15,23,42,.08);
  --radius-xl:28px;
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:12px;
  --nav-h:86px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left, rgba(31,138,87,.08), transparent 28%),
    radial-gradient(circle at bottom right, rgba(217,164,65,.12), transparent 30%),
    linear-gradient(180deg,#f8fbff 0%,#f3f6fb 100%);
  -webkit-font-smoothing:antialiased;
}
button,input,select,textarea{font:inherit}
#app{min-height:100%;display:flex;align-items:center;justify-content:center;padding:22px}
.phone{
  width:min(100%,430px);
  min-height:min(920px,calc(100vh - 44px));
  background:rgba(255,255,255,.9);
  border-radius:36px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.9);
  box-shadow:0 28px 88px rgba(15,23,42,.16), inset 0 1px 0 rgba(255,255,255,.85);
  position:relative;
}
.phone::before{content:"";position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:28px;background:#0f172a;opacity:.08;border-radius:20px;z-index:4}
.screen{min-height:min(920px,calc(100vh - 44px));display:flex;flex-direction:column;background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(247,250,253,.98))}
.header{position:sticky;top:0;z-index:5;padding:18px 18px 12px;background:linear-gradient(180deg,rgba(255,255,255,.95),rgba(255,255,255,.78));backdrop-filter:blur(16px)}
.row{display:flex;align-items:center;gap:12px}
.space{justify-content:space-between}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#1f8a57,#103a29);box-shadow:0 12px 28px rgba(31,138,87,.28);display:grid;place-items:center;color:#fff;font-size:20px;font-weight:800}
.brand h1{font-size:18px;line-height:1.1;margin:0;font-weight:800;letter-spacing:-.03em}
.brand p{margin:4px 0 0;color:var(--muted);font-size:12px}
.icon-btn{width:40px;height:40px;border-radius:14px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;color:#334155;box-shadow:0 6px 18px rgba(15,23,42,.04);cursor:pointer}
.icon-btn.small{width:34px;height:34px;border-radius:12px}
.icon{font-size:17px}
.toolbar{display:flex;gap:8px;align-items:center;margin-top:14px}
.search{flex:1;display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1px solid var(--line);padding:12px 14px;border-radius:16px;color:var(--muted)}
.search input{border:none;background:transparent;outline:none;width:100%;color:var(--text)}
.pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:700;color:#334155}
.pill.green{background:var(--green-2);color:var(--green-3);border-color:transparent}
.pill-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.content{padding:6px 18px calc(var(--nav-h) + 26px);display:flex;flex-direction:column;gap:18px}
.hero{background:linear-gradient(135deg,#123b2a,#1f8a57 62%,#2aa66c);color:#fff;border-radius:28px;padding:20px;box-shadow:0 20px 40px rgba(31,138,87,.22);position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-24px;top:-18px;width:150px;height:150px;background:radial-gradient(circle, rgba(255,255,255,.18), transparent 68%)}
.hero h2{margin:0;font-size:26px;line-height:1.05;font-weight:800;letter-spacing:-.04em;max-width:210px}
.hero p{margin:10px 0 0;max-width:220px;font-size:13px;line-height:1.55;color:rgba(255,255,255,.85)}
.hero .badge{display:inline-flex;margin-top:14px;padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.16);font-size:12px;font-weight:700}
.hero-art{position:absolute;right:16px;bottom:14px;width:118px;height:118px;border-radius:28px;background:rgba(255,255,255,.12);display:grid;place-items:center;font-size:54px;transform:rotate(-8deg)}
.section-title{display:flex;align-items:end;justify-content:space-between;gap:12px}
.section-title h3{margin:0;font-size:20px;font-weight:800;letter-spacing:-.03em}
.section-title span{color:var(--muted);font-size:12px;font-weight:700}
.categories{display:flex;gap:10px;overflow:auto;padding-bottom:2px}
.categories::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;min-width:86px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px 10px;text-align:center;box-shadow:0 8px 20px rgba(15,23,42,.04);cursor:pointer}
.chip.active{background:var(--green-2);border-color:transparent}
.chip .emoji{font-size:20px;display:block;margin-bottom:8px}
.chip .label{font-size:12px;font-weight:800;color:#334155}
.banner{display:grid;grid-template-columns:1.2fr .8fr;gap:14px;background:#fff;border-radius:24px;padding:16px;border:1px solid var(--line);box-shadow:var(--shadow)}
.banner h4{margin:0;font-size:18px;line-height:1.15;font-weight:800;letter-spacing:-.03em}
.banner p{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.6}
.banner-art{border-radius:20px;background:linear-gradient(135deg,#fff6e1,#fff0be);display:grid;place-items:center;font-size:54px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:14px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:12px}
.card.compact{gap:10px}
.product-visual{height:120px;border-radius:20px;background:linear-gradient(135deg,#f7fafc,#eef4fb);display:grid;place-items:center;position:relative;overflow:hidden}
.product-visual::before{content:"";position:absolute;inset:auto -22px -26px auto;width:82px;height:82px;border-radius:50%;background:rgba(31,138,87,.08)}
.product-icon{font-size:54px;filter:drop-shadow(0 10px 14px rgba(15,23,42,.08))}
.badge-row{display:flex;gap:8px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);color:#334155;border-radius:999px;padding:6px 10px;font-size:11px;font-weight:800}
.tag.green{background:var(--green-2);color:var(--green-3)}
.product-name{font-size:15px;font-weight:800;line-height:1.25;letter-spacing:-.02em}
.product-sub{font-size:12px;color:var(--muted);line-height:1.5;min-height:36px}
.price-block{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end}
.price-main{font-size:22px;font-weight:900;letter-spacing:-.04em}
.price-unit{font-size:11px;color:var(--muted);font-weight:700}
.market-price{font-size:12px;color:var(--muted);text-align:right}
.market-price strong{color:#334155}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn{border:none;border-radius:16px;padding:12px 12px;font-weight:800;cursor:pointer}
.btn.light{background:#f4f7fb;color:#1e293b;border:1px solid var(--line)}
.btn.green{background:linear-gradient(135deg,var(--green),var(--green-3));color:#fff;box-shadow:0 12px 22px rgba(31,138,87,.18)}
.stepper{display:flex;align-items:center;justify-content:space-between;border:1px solid var(--line);background:#fff;border-radius:16px;padding:6px}
.stepper button{width:34px;height:34px;border:none;border-radius:12px;background:#f4f7fb;font-size:18px;font-weight:800;cursor:pointer;color:#1e293b}
.stepper .qty{font-size:14px;font-weight:900;min-width:40px;text-align:center}
.stepper .unit{font-size:10px;color:var(--muted);display:block;font-weight:700}
.list{display:flex;flex-direction:column;gap:12px}
.list-item{display:grid;grid-template-columns:70px 1fr auto;gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:22px;padding:12px;box-shadow:var(--shadow)}
.thumb{width:70px;height:70px;border-radius:18px;background:linear-gradient(135deg,#f7fafc,#eef4fb);display:grid;place-items:center;font-size:34px}
.list-title{font-size:14px;font-weight:800;line-height:1.25}
.list-sub{font-size:12px;color:var(--muted);margin-top:4px}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.metric{background:#fff;border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:var(--shadow)}
.metric.big{grid-column:1/-1;background:linear-gradient(135deg,#123b2a,#1f8a57);color:#fff;border:none}
.metric .label{font-size:12px;font-weight:800;color:var(--muted)}
.metric.big .label{color:rgba(255,255,255,.78)}
.metric .value{margin-top:8px;font-size:28px;font-weight:900;letter-spacing:-.05em}
.metric.small .value{font-size:22px}
.metric .meta{margin-top:10px;font-size:12px;line-height:1.5;color:var(--muted)}
.metric.big .meta{color:rgba(255,255,255,.82)}
.order-summary{background:#fff;border:1px solid var(--line);border-radius:26px;padding:16px;box-shadow:var(--shadow)}
.summary-row{display:flex;justify-content:space-between;gap:10px;padding:9px 0;color:#334155;font-size:14px}
.summary-row strong{font-size:16px}
.divider{height:1px;background:var(--line);margin:4px 0}
.analytics{background:#fff;border:1px solid var(--line);border-radius:26px;padding:16px;box-shadow:var(--shadow)}
.chart{height:144px;border-radius:20px;background:linear-gradient(180deg,#f8fafc,#f3f7fb);padding:12px;border:1px solid #eef2f7}
.chart svg{width:100%;height:100%}
.insight{margin-top:12px;background:#f6fbf8;border:1px solid #dbeee2;border-radius:18px;padding:12px;color:#224737;font-size:13px;line-height:1.6}
.insight b{color:#0f6d45}
.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:10px 14px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:12px;font-weight:800;color:#334155;cursor:pointer}
.tab.active{background:var(--green-2);color:var(--green-3);border-color:transparent}
.bottom-nav{position:absolute;left:16px;right:16px;bottom:14px;height:72px;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border:1px solid rgba(229,235,242,.95);box-shadow:0 18px 38px rgba(15,23,42,.08);border-radius:26px;padding:10px 14px;display:grid;grid-template-columns:1fr 1fr 72px 1fr 1fr;align-items:center;z-index:7}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;color:#64748b;cursor:pointer}
.nav-btn .nav-icon{font-size:18px}
.nav-btn .nav-label{font-size:11px;font-weight:800}
.nav-btn.active{color:#0f172a}
.nav-center{width:58px;height:58px;border:none;border-radius:20px;background:linear-gradient(135deg,var(--green),var(--green-3));color:#fff;display:grid;place-items:center;box-shadow:0 16px 26px rgba(31,138,87,.24);font-size:20px;cursor:pointer;justify-self:center;transform:translateY(-12px);position:relative}
.sheet-backdrop{position:absolute;inset:0;background:rgba(15,23,42,.34);z-index:20;display:none}
.sheet-backdrop.show{display:block}
.sheet{position:absolute;left:10px;right:10px;bottom:10px;max-height:76%;overflow:auto;background:#fff;border-radius:30px;padding:18px;border:1px solid var(--line);box-shadow:0 30px 60px rgba(15,23,42,.18);transform:translateY(110%);transition:.25s ease;z-index:25}
.sheet-backdrop.show .sheet{transform:translateY(0)}
.sheet-handle{width:48px;height:5px;background:#dbe2ea;border-radius:999px;margin:2px auto 14px}
.sheet-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
.sheet-title{font-size:22px;font-weight:900;letter-spacing:-.04em}
.sheet-sub{font-size:13px;color:var(--muted);line-height:1.55;margin-top:6px}
.field{margin-top:12px}
.label{display:block;margin-bottom:8px;font-size:12px;font-weight:800;color:#334155}
.input,.select,.textarea{width:100%;border:1px solid var(--line);background:#f8fafc;border-radius:16px;padding:13px 14px;outline:none;color:var(--text)}
.textarea{min-height:94px;resize:vertical}
.upload{display:flex;align-items:center;justify-content:center;border:1.5px dashed #cdd8e5;background:#f8fafc;border-radius:18px;padding:18px;text-align:center;color:#64748b;font-size:13px;line-height:1.6}
.upload small{display:block;color:#0f6d45;font-weight:800;margin-top:4px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cta-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.info-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.info-strip .tag{background:#fff8eb;color:#7a5608}
.notice{background:#fff8eb;border:1px solid #f7e4b7;color:#7a5608;border-radius:18px;padding:12px;font-size:13px;line-height:1.6;margin-top:12px}
.footer-space{height:10px}
.empty{padding:26px;border-radius:24px;background:#fff;border:1px dashed #d4dce8;text-align:center;color:var(--muted);font-size:14px;line-height:1.7}
.muted{color:var(--muted)}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.kpi{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:12px}
.kpi .k{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.72);font-weight:800}
.kpi .v{margin-top:8px;font-size:18px;font-weight:900;letter-spacing:-.04em}
.lang-toggle{display:flex;gap:4px;background:#f4f7fb;padding:4px;border-radius:14px;border:1px solid var(--line)}
.lang-toggle button{border:none;background:transparent;border-radius:10px;padding:7px 10px;font-size:12px;font-weight:800;color:#64748b;cursor:pointer}
.lang-toggle button.active{background:#fff;color:#0f172a;box-shadow:0 4px 12px rgba(15,23,42,.06)}

.logo-wrap{display:flex;align-items:center;gap:12px;cursor:pointer}
.logo-wrap:active{transform:translateY(1px)}
.hero-top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
.hero-copy{max-width:215px}
.hero-links{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.hero-link{border:none;border-radius:14px;padding:11px 14px;font-size:12px;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:8px}
.hero-link.primary{background:#fff;color:#0f6d45;box-shadow:0 10px 24px rgba(15,23,42,.14)}
.hero-link.secondary{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.18)}
.hero-promo{width:136px;min-height:168px;border-radius:24px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.15);padding:12px;box-shadow:inset 0 1px 0 rgba(255,255,255,.1);cursor:pointer}
.hero-promo-emoji{height:82px;border-radius:18px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:42px;margin-bottom:10px}
.hero-promo-title{font-size:12px;font-weight:800;line-height:1.35}
.hero-promo-meta{margin-top:6px;font-size:11px;color:rgba(255,255,255,.82);line-height:1.5}
.promo-strip{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.promo-card{background:#fff;border:1px solid var(--line);border-radius:24px;padding:14px;box-shadow:var(--shadow);display:grid;grid-template-columns:72px 1fr;gap:12px;align-items:center;cursor:pointer}
.promo-card:hover,.hero-promo:hover,.logo-wrap:hover{filter:brightness(.99)}
.promo-thumb{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,#eff9f2,#dff6ea);display:grid;place-items:center;font-size:34px}
.promo-card h4{margin:0;font-size:14px;line-height:1.25;font-weight:900;letter-spacing:-.03em}
.promo-card p{margin:6px 0 0;color:var(--muted);font-size:12px;line-height:1.5}
.promo-card .mini{margin-top:8px;font-size:11px;font-weight:800;color:#0f6d45}
.product-visual,.product-name,.thumb{cursor:pointer}
.product-name{font-size:16px}
.product-sub{font-size:12.5px}
.market-price{font-size:11.5px}
.stepper{margin-top:2px}
.btn{font-size:13px}
.bottom-nav .nav-center::after{content:'Order';position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;color:#475569}
html[lang="zh"] .bottom-nav .nav-center::after{content:'订单'}

@media (max-width:380px){.grid{grid-template-columns:1fr}.hero-promo{width:100%;min-height:auto}.hero-top{flex-direction:column}.promo-strip{grid-template-columns:1fr}.banner{grid-template-columns:1fr}.two-col{grid-template-columns:1fr}.metrics{grid-template-columns:1fr}.kpi-grid{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>

function getProduct(id){ return products.find(p=>p.id===id); }

function marketPrice(p, unit){ return unit==='case' ? p.marketCasePrice : p.marketPalletPrice; }
function ourPrice(p, unit){ return unit==='case' ? p.casePrice : p.palletPrice; }
function step(id, delta){
  const key = id + ':' + state.unit;
  const next = Math.max(0, (state.cart[key] || 0) + delta);
  if(next===0) delete state.cart[key]; else state.cart[key]=next;
  render();
}
function productQty(id, unit=state.unit){ return state.cart[id+':'+unit] || 0; }
function filteredProducts(){
  return products.filter(p=>{
    const matchCat = state.category==='all' || p.category===state.category;

    const matchSearch = !q || info.name.toLowerCase().includes(q) || info.desc.toLowerCase().includes(q);
    return matchCat && matchSearch;

function cartItems(){
  return Object.entries(state.cart).map(([key,qty])=>{
    const [productId,unit] = key.split(':');
    const p = getProduct(productId);
    return { p, unit, qty, total: ourPrice(p, unit) * qty, savings: (marketPrice(p, unit)-ourPrice(p, unit))*qty, rebate: p.ownBrand ? p.rebate * qty : 0 };
  });
}
function totals(){
  const items = cartItems();
  const subtotal = items.reduce((a,b)=>a+b.total,0);
  const savings = items.reduce((a,b)=>a+b.savings,0);
  const rebate = items.reduce((a,b)=>a+b.rebate,0);
  const creditBack = items.reduce((a,b)=>a + (b.p.creditReward * Math.min(b.qty,2)),0);
  const delivery = subtotal > 0 ? (subtotal >= 450 ? 0 : 18) : 0;
  return { subtotal, savings, rebate, creditBack, delivery, total: subtotal + delivery };
}

}
function chartSvg(values, color='#1f8a57'){
  const w=300,h=120,pad=10;
  const max=Math.max(...values), min=Math.min(...values);
  const pts = values.map((v,i)=>{
    const x = pad + (w-pad*2) * (i/(values.length-1));
    const y = h-pad - ((v-min)/((max-min)||1)) * (h-pad*2);
    return [x,y];
  });
  const poly = pts.map(p=>p.join(',')).join(' ');
  const area = [[pts[0][0],h-pad],...pts,[pts[pts.length-1][0],h-pad]].map(p=>p.join(',')).join(' ');
  const circles = pts.map(([x,y])=>`<circle cx="${x}" cy="${y}" r="3.4" fill="${color}" />`).join('');
  const labels = [0,1,2,3].map(i=>`<line x1="${pad}" x2="${w-pad}" y1="${pad + i*(h-pad*2)/3}" y2="${pad + i*(h-pad*2)/3}" stroke="#e7eef6" />`).join('');
  return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><defs><linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.18"/><stop offset="100%" stop-color="${color}" stop-opacity="0.02"/></linearGradient></defs>${labels}<polygon points="${area}" fill="url(#g1)"/><polyline points="${poly}" fill="none" stroke="${color}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>${circles}</svg>`;
}

    <div class="tabs">${categories.map(c=>`<button class="tab ${state.category===c.id?'active':''}" onclick="setCategory('${c.id}')">${state.lang==='en'?c.en:c.zh}</button>`).join('')}</div>
    <div class="pill-group">
      <button class="pill ${state.unit==='case'?'green':''}" onclick="setUnit('case')">${t('caseOrder')}</button>
      <button class="pill ${state.unit==='pallet'?'green':''}" onclick="setUnit('pallet')">${t('palletOrder')}</button>
      <div class="pill">${t('deliveryDay')}: ${currentRegion()[state.lang==='en'?'dayEn':'dayZh']}</div>
    </div>
    <div class="grid">${list.map(renderProductCard).join('')}</div>`;
}
function orderView(){
  const items = cartItems(); const total = totals();
  return `
    <div class="section-title"><h3>${t('orderCenter')}</h3><span>${t('orderCenterCopy')}</span></div>
    ${items.length ? `<div class="list">${items.map(({p,unit,qty,total:sTotal})=>{
      const info = infoFor(p); return `<div class="list-item"><div class="thumb">${p.emoji}</div><div><div class="list-title">${info.name}</div><div class="list-sub">${qty} × ${unit==='case'?t('caseOrder'):t('palletOrder')} · ${money(ourPrice(p,unit))}</div></div><div style="text-align:right"><div class="list-title">${money(sTotal)}</div><button class="btn light" style="margin-top:8px;padding:8px 10px" onclick="step('${p.id}',1)">+</button></div></div>`}).join('')}</div>` : `<div class="empty">${t('emptyOrder')}</div>`}
    <div class="order-summary">
      <div class="summary-row"><span>${t('subtotal')}</span><span>${money(total.subtotal)}</span></div>
      <div class="summary-row"><span>${t('deliveryFee')}</span><span>${total.delivery ? money(total.delivery) : 'Free'}</span></div>
      <div class="summary-row"><span>${t('creditBack')}</span><span>${total.creditBack}</span></div>
      <div class="divider"></div>
      <div class="summary-row"><strong>${t('total')}</strong><strong>${money(total.total)}</strong></div>
      <button class="btn green" style="width:100%;margin-top:12px" onclick="placeOrder()">${t('checkout')}</button>
    </div>
    <div class="analytics">
      <div class="section-title"><h3>${t('analytics')}</h3><span>${t('ai')}</span></div>
      <div class="chart">${chartSvg(products[0].trend)}</div>
      <div class="insight"><b>${t('ai')}:</b> ${t('aiCopy')}<br>${t('aiCopy2')}</div>
    </div>
    <div class="section-title"><h3>${t('lineOpen')}</h3><span>${orderHistory.length} lines</span></div>
    <div class="list">${orderHistory.map(o=>{ const p=getProduct(o.productId); const info=infoFor(p); return `<div class="list-item"><div class="thumb">${p.emoji}</div><div><div class="list-title">${info.name}</div><div class="list-sub">${o.id} · ${o.date} · ${state.lang==='en'?o.status:(o.status==='Delivered'?t('delivered'):o.status==='Processing'?t('processing'):t('pending'))}</div></div><div style="text-align:right"><div class="list-title">${money(o.total)}</div><div class="list-sub">${o.qty} ${o.unit}</div></div></div>`}).join('')}</div>`;
}
function offersView(){
  return `
    <div class="banner">
      <div>
        <h4>${t('promoTitle')}</h4>
        <p>${t('promoCopy')}</p>
        <div class="info-strip"><span class="tag green">+${Math.round(products.filter(p=>p.ownBrand).reduce((a,b)=>a+b.creditReward,0)/products.filter(p=>p.ownBrand).length)} ${t('credits')}</span></div>
      </div>
      <div class="banner-art">🏷️</div>
    </div>
    <div class="banner">
      <div>
        <h4>${t('creditBanner')}</h4>
        <p>${state.lang==='en' ? 'Send us shelf labels, screenshots or invoices from the market. Approved proof can unlock extra credit.' : '上传市场价签、截图或发票，审核通过后可获得额外积分。'}</p>
      </div>
      <div class="banner-art">📸</div>
    </div>
    <div class="section-title"><h3>${t('featured')}</h3><span>${t('sort')}</span></div>
    <div class="grid">${products.slice(0,4).map(renderProductCard).join('')}</div>`;
}
function myView(){
  const m = overallMetrics(); const total = totals();
  return `
    <div class="metrics">
      <div class="metric big">
        <div class="label">${t('savings')}</div>
        <div class="value">${money(m.savings)}</div>
        <div class="meta">${t('savingsMeta')}</div>
        <div class="kpi-grid">
          <div class="kpi"><div class="k">${t('thisMonth')}</div><div class="v">${money(total.savings)}</div></div>
          <div class="kpi"><div class="k">${t('openOrders')}</div><div class="v">${cartItems().length}</div></div>
          <div class="kpi"><div class="k">${t('credits')}</div><div class="v">${m.credits}</div></div>
        </div>
      </div>
      <div class="metric small"><div class="label">${t('rebate')}</div><div class="value">${money(m.rebate)}</div><div class="meta">${t('rebateMeta')}</div></div>
      <div class="metric small"><div class="label">${t('credits')}</div><div class="value">${m.credits}</div><div class="meta">${t('creditsMeta')}</div></div>
    </div>
    <div class="analytics">
      <div class="section-title"><h3>${t('basketMix')}</h3><span>${t('overview')}</span></div>
      <div class="chart">${chartSvg([18,22,26,24,28,30,27,32,34,36], '#d9a441')}</div>
      <div class="insight"><b>${t('marketing')}:</b> ${state.lang==='en' ? 'Own-brand items are now 41% of your basket and have generated stronger rebate return than standard market lines.' : '自有品牌商品已占你采购结构的 41%，返利表现高于普通市场货。'}</div>
    </div>
    <div class="banner">
      <div>
        <h4>${t('account')}</h4>
        <p>${state.lang==='en' ? 'Business tier: Partner Kitchen · Payment term: Weekly settlement · Credit available for price-match proof and next order redemption.' : '商户等级：合作厨房 · 结算方式：周结 · 积分可用于比价上传奖励与下次抵扣。'}</p>
      </div>
      <div class="banner-art">📈</div>
    </div>`;
}
function detailSheet(){
  const p = getProduct(state.detailProductId); if(!p) return '';
  const info=infoFor(p); const unit=state.unit;
  return `<div class="sheet-backdrop show" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-head"><div><div class="sheet-title">${info.name}</div><div class="sheet-sub">${info.desc}</div><div class="info-strip"><span class="tag ${p.ownBrand?'green':''}">${p.ownBrand?t('badgeOwn'):t('badgeFast')}</span><span class="tag">${t('deliveryDay')}: ${currentRegion()[state.lang==='en'?'dayEn':'dayZh']}</span></div></div><button class="icon-btn small" onclick="closeSheet()">✕</button></div><div class="product-visual" style="height:144px"><div class="product-icon" style="font-size:62px">${p.emoji}</div></div><div class="two-col" style="margin-top:14px"><div class="metric small"><div class="label">${t('orderNow')}</div><div class="value">${money(ourPrice(p,unit))}</div><div class="meta">${unit==='case'?t('perCase'):t('perPallet')}</div></div><div class="metric small"><div class="label">${t('marketPrice')}</div><div class="value">${money(marketPrice(p,unit))}</div><div class="meta">${t('compareWith')}</div></div></div><div class="pill-group"><button class="pill ${state.unit==='case'?'green':''}" onclick="setUnit('case')">${t('caseOrder')}</button><button class="pill ${state.unit==='pallet'?'green':''}" onclick="setUnit('pallet')">${t('palletOrder')}</button><div class="pill green">+${p.creditReward} ${t('credits')}</div></div><div class="field"><span class="label">${t('details1')}</span><div class="notice">${info.pack}<br>${info.pallet}</div></div><div class="field"><span class="label">${t('details4')}</span><div class="notice">${info.details1}<br>${info.details2}</div></div><div class="field"><span class="label">${t('priceTrend')}</span><div class="chart">${chartSvg(p.trend)}</div></div><div class="cta-row"><button class="btn light" onclick="openSheet('match','${p.id}')">${t('priceMatch')}</button><button class="btn green" onclick="step('${p.id}',1)">${t('directOrder')}</button></div><div class="footer-space"></div></div></div>`;
}
function matchSheet(){
  const p = getProduct(state.priceMatchProductId); if(!p) return '';
  const info=infoFor(p);
  return `<div class="sheet-backdrop show" onclick="closeSheet()"><div class="sheet" onclick="event.stopPropagation()"><div class="sheet-handle"></div><div class="sheet-head"><div><div class="sheet-title">${t('matchTitle')}</div><div class="sheet-sub">${info.name}<br>${t('matchCopy')}</div></div><button class="icon-btn small" onclick="closeSheet()">✕</button></div><div class="notice">${t('uploadReward')} · +${p.creditReward} ${t('credits')}</div><div class="field"><label class="label">${t('competitor')}</label><select class="select" onchange="state.competitor=this.value">${competitors.map(c=>`<option value="${c.en}" ${state.competitor===c.en?'selected':''}>${state.lang==='en'?c.en:c.zh}</option>`).join('')}</select></div><div class="two-col"><div class="field"><label class="label">${t('theirPrice')}</label><input class="input" value="${state.competitorPrice}" oninput="state.competitorPrice=this.value" placeholder="£ 19.9"/></div><div class="field"><label class="label">${t('chooseUnit')}</label><select class="select" onchange="state.competitorUnit=this.value"><option value="case" ${state.competitorUnit==='case'?'selected':''}>${t('caseOrder')}</option><option value="pallet" ${state.competitorUnit==='pallet'?'selected':''}>${t('palletOrder')}</option></select></div></div><div class="field"><label class="label">${t('upload')}</label><label class="upload"><input id="proofFile" type="file" accept="image/*" style="display:none" onchange="state.proofAttached=!!this.files.length; render()"/><div>${t('uploadNote')}<small>${t('creditBanner')}</small></div></label></div><div class="field"><label class="label">${t('yourNote')}</label><textarea class="textarea" oninput="state.priceMatchNote=this.value" placeholder="${state.lang==='en'?'Add shop name, shelf price, invoice note…':'可填写门店名、价签说明、发票备注等…'}">${state.priceMatchNote}</textarea></div><div class="cta-row"><button class="btn light" onclick="closeSheet()">${t('cancel')}</button><button class="btn green" onclick="submitPriceMatch()">${t('submit')}</button></div><div class="footer-space"></div></div></div>`;
}
function header(){
  return `<div class="header"><div class="row space"><div class="brand logo-wrap" onclick="openHome()"><div class="logo">A</div><div><h1>Asterra Supply</h1><p>${t('sub')}</p></div></div><div class="row"><button class="icon-btn small" onclick="setPage('order')">🛒</button><div class="lang-toggle"><button class="${state.lang==='en'?'active':''}" onclick="setLang('en')">EN</button><button class="${state.lang==='zh'?'active':''}" onclick="setLang('zh')">中</button></div></div></div><div class="toolbar"><div class="search"><span>🔎</span><input value="${state.search.replace(/"/g,'&quot;')}" oninput="setSearch(this.value)" placeholder="${t('search')}"/></div><button class="icon-btn" onclick="setPage('catalog')">☰</button></div><div class="pill-group"><button class="pill green" onclick="cycleRegion()">📍 ${currentRegion()[state.lang==='en'?'en':'zh']}</button><div class="pill">🚚 ${currentRegion()[state.lang==='en'?'dayEn':'dayZh']}</div></div></div>`;
}
function cycleRegion(){
  const idx = regions.findIndex(r=>r.id===state.region);
  state.region = regions[(idx+1)%regions.length].id; render();
}
function openHome(){ state.page='home'; state.sheet=null; render(); }
window.openHome = openHome;
window.cycleRegion = cycleRegion;
window.setPage=setPage; window.setLang=setLang; window.setCategory=setCategory; window.setSearch=setSearch; window.setUnit=setUnit; window.step=step; window.openSheet=openSheet; window.closeSheet=closeSheet; window.submitPriceMatch=submitPriceMatch;
function render(){
  document.documentElement.lang = state.lang;
  const views = {home:homeView(), catalog:catalogView(), order:orderView(), offers:offersView(), my:myView()};
  document.getElementById('app').innerHTML = `<div class="phone"><div class="screen">${header()}<div class="content">${views[state.page]}</div><div class="bottom-nav">${navBtn('home','⌂',t('home'))}${navBtn('catalog','▦',t('catalog'))}<button class="nav-center" onclick="setPage('order')">🛒</button>${navBtn('offers','✦',t('offers'))}${navBtn('my','◔',t('my'))}</div>${state.sheet==='detail'?detailSheet():''}${state.sheet==='match'?matchSheet():''}</div></div>`;
}
render();
</script>
</body>
</html>
